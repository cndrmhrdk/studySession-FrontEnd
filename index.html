<!DOCTYPE html>

<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
    <link href="https://fonts.googleapis.com" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
    <title>Cander - HOME PAGE</title>
    <style>
        /* * {outline: 1px solid red;} */

        nav{
            background-color: rgb(37, 38, 75);
            box-shadow: rgba(41, 7, 99, 0.559) 0px 0px 30px;
        }

        .nav-link{
            font-family: 'Poppins', sans-serif;
            font-size: large;
            color: rgb(171, 171, 171);
        }

        body{
            background: rgb(12, 0, 32);
        }

        .myFace{
            box-shadow: rgba(55, 2, 135, 0.16) 0px 0px 50px;
            transition: .5s all ease-in-out;
        }
        
        .myFace:hover{
            transform: scale(1.04);
        }
        
        .card{
            background-color: rgba(234, 230, 255, 0);
            border: solid rgb(155, 155, 196) 1.2px;
            border-radius: 15px;
            box-shadow: rgba(141, 127, 199, 0.407) 0px 0px 10px;
            color: white;
        }
        
        .click{
            transition: 0.4s all ease-in-out;
            transform: scale(1.02);
        }
        
        .click:hover{
            box-shadow: rgba(255, 255, 255, 0.46) 0px 0px 20px;
            transform: rotate(1deg);
        }
    </style>
</head>
